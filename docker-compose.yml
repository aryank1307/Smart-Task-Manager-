services:
  mysql:
    image: mysql:8.4
    container_name: stm-mysql
    restart: always
    environment:
      MYSQL_DATABASE: smart_task_manager
      MYSQL_USER: stm_user
      MYSQL_PASSWORD: stm_password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: stm-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: stm-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
